name: Generate Social Media Content
on:
  schedule:
      - cron: '0 4 * * 1,3'
        workflow_dispatch:
        jobs:
          generate:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-python@v5
                                      with:
                                                python-version: '3.10'
                                                      - run: pip install -r requirements.txt
                                                            - name: Run Generator
                                                                    env:
                                                                              GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                                        DISCORD_WEBHOOK_A1_STOP: ${{ secrets.DISCORD_WEBHOOK_A1_STOP }}
                                                                                                run: python src/generator.py
                                                                                                
